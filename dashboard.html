<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumina | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <span class="logo">Lumina Library</span>
        <div class="nav-right">
            <span id="user-info"></span>
            <button id="logout-btn" class="danger-btn">Logout</button>
        </div>
    </nav>

    <main class="container">
        <div id="admin-view" class="role-section hidden">
            <div class="card">
                <h3>User Management</h3>
                <table id="user-table">
                    <thead><tr><th>Email</th><th>Role</th><th>Action</th></tr></thead>
                    <tbody id="user-list"></tbody>
                </table>
            </div>
        </div>

        <div id="librarian-view" class="role-section hidden">
            <div class="grid-2">
                <div class="card">
                    <h3>Add Book</h3>
                    <input type="text" id="isbn-input" placeholder="ISBN">
                    <button id="fetch-btn">Find Book</button>
                    <div id="preview" class="hidden">
                        <img id="p-img" src="">
                        <p id="p-title"></p>
                        <button id="add-final">Add to Catalog</button>
                    </div>
                </div>
                <div class="card">
                    <h3>Issue Loan</h3>
                    <input type="text" id="l-isbn" placeholder="ISBN">
                    <input type="text" id="l-email" placeholder="Student Email">
                    <button id="loan-btn">Confirm Loan</button>
                </div>
            </div>
        </div>

        <div id="student-view" class="role-section">
            <h3>Current Borrowings</h3>
            <div id="book-list" class="book-grid"></div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
