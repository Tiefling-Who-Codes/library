<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MER Library | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1 style="color: #4f46e5; margin-bottom: 0;">MER</h1>
        <h2 style="margin-top: 0; font-weight: 300;">Library Portal</h2>
        <div class="input-group">
            <input type="email" id="email" placeholder="Staff or Student Email">
            <input type="password" id="password" placeholder="Password">
        </div>
        <button id="login-btn">Login</button>
        <p id="error-msg" style="color: #ef4444; font-size: 0.8rem; margin-top: 10px;"></p>
        <div class="footer-note">Contact administration for account access.</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDywAKfnmV6gnXyCsF1mjrE5THdV7l8O_M",
            authDomain: "library-c5b1f.firebaseapp.com",
            projectId: "library-c5b1f",
            storageBucket: "library-c5b1f.firebasestorage.app",
            messagingSenderId: "301737185007",
            appId: "1:301737185007:web:3806e6949d24817a16d51a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('login-btn').onclick = () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, e, p)
                .then(() => window.location.href = "dashboard.html")
                .catch(err => { document.getElementById('error-msg').innerText = "Invalid credentials."; });
        };
    </script>
</body>
</html>
