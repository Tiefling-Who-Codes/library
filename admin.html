<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MER | Super Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Admin-Specific Spreadsheet Styling */
        .admin-container { max-width: 1200px; margin: 20px auto; padding: 10px; }
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--primary); color: white; padding: 20px; border-radius: 12px; text-align: center; }
        .table-wrapper { overflow-x: auto; background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: #f1f5f9; color: var(--text-light); text-transform: uppercase; font-size: 0.75rem; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .status-overdue { background: #fee2e2; color: #ef4444; }
        .status-active { background: #dcfce7; color: #10b981; }
        .search-bar { margin-bottom: 20px; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="logo">MER SYSTEM ADMIN</span>
        <a href="dashboard.html" style="color:white; text-decoration:none; font-size:0.8rem;">Back to App</a>
    </nav>

    <div class="admin-container">
        <div class="stats-bar">
            <div class="stat-card">
                <small>Total Loans</small>
                <h2 id="stat-total">0</h2>
            </div>
            <div class="stat-card" style="background:#f59e0b;">
                <small>Overdue</small>
                <h2 id="stat-overdue">0</h2>
            </div>
            <div class="stat-card" style="background:#10b981;">
                <small>Active Users</small>
                <h2 id="stat-users">0</h2>
            </div>
        </div>

        <h3>Active Loans Spreadsheet</h3>
        <input type="text" id="admin-search" class="search-bar" placeholder="Search by Student Email or ISBN...">
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Student Email</th>
                        <th>Book ISBN</th>
                        <th>Date Borrowed</th>
                        <th>Due Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="admin-loan-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDywAKfnmV6gnXyCsF1mjrE5THdV7l8O_M",
            authDomain: "library-c5b1f.firebaseapp.com",
            projectId: "library-c5b1f",
            storageBucket: "library-c5b1f.firebasestorage.app",
            messagingSenderId: "301737185007",
            appId: "1:301737185007:web:3806e6949d24817a16d51a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Security Check: Only allow logged in Admins
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            const d = await getDoc(doc(db, "users", user.uid));
            if (d.data()?.role !== 'admin') {
                alert("Access Denied: Admin Eyes Only");
                window.location.href = "dashboard.html";
            }
        });

        // Load Spreadsheet Data
        const loanTable = document.getElementById('admin-loan-list');
        const q = query(collection(db, "borrowings"), orderBy("dueDate", "asc"));

        onSnapshot(q, (snapshot) => {
            loanTable.innerHTML = "";
            let overdueCount = 0;
            
            snapshot.forEach((doc) => {
                const loan = doc.data();
                const isOverdue = loan.dueDate < Date.now();
                if (isOverdue) overdueCount++;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${loan.studentEmail}</td>
                    <td>${loan.isbn}</td>
                    <td>${new Date(loan.borrowedAt || Date.now()).toLocaleDateString()}</td>
                    <td>${new Date(loan.dueDate).toLocaleDateString()}</td>
                    <td>
                        <span class="status-badge ${isOverdue ? 'status-overdue' : 'status-active'}">
                            ${isOverdue ? 'OVERDUE' : 'ACTIVE'}
                        </span>
                    </td>
                    <td>
                        <button class="danger-btn" style="padding:5px 10px; font-size:0.7rem;" onclick="returnBook('${doc.id}')">Return</button>
                    </td>
                `;
                loanTable.appendChild(row);
            });

            // Update Stats
            document.getElementById('stat-total').innerText = snapshot.size;
            document.getElementById('stat-overdue').innerText = overdueCount;
        });

        // Get User Count
        onSnapshot(collection(db, "users"), s => {
            document.getElementById('stat-users').innerText = s.size;
        });

        // Return Logic
        window.returnBook = async (id) => {
            if(confirm("Confirm book return? This removes the loan record.")) {
                await deleteDoc(doc(db, "borrowings", id));
            }
        };

        // Search Filter Logic
        document.getElementById('admin-search').onkeyup = function() {
            let filter = this.value.toLowerCase();
            let rows = loanTable.getElementsByTagName('tr');
            for (let row of rows) {
                row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
            }
        };
    </script>
</body>
</html>
